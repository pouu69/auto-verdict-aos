<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Play Store 512 icon — faithful render of the actual launcher icon.
    Background  = ic_launcher_background.xml (flat #3B82F6)
    Foreground  = ic_launcher_foreground.xml (car + integrated check badge),
                  scaled from the 108 adaptive viewport to 512 (512/108 = 4.74074).
    Rounded corners (rx 112) approximate the on-device adaptive mask.
    Keep this in sync with app/src/main/res whenever the launcher icon changes.
  -->

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="#3B82F6"/>

  <!-- Foreground: exact copy of ic_launcher_foreground.xml, scaled 108 -> 512 -->
  <g transform="scale(4.74074)">
    <!-- Car body outline -->
    <path d="M30,58l4,-8l8,-4l24,0l6,6l6,0l0,6l-2,0a4,4 0 0 1 -8,0l-24,0a4,4 0 0 1 -8,0l-6,0z"
          fill="none" stroke="#FFFFFF" stroke-width="2.4"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Front wheel -->
    <circle cx="40" cy="58" r="2.5" fill="#FFFFFF"/>
    <!-- Rear wheel -->
    <circle cx="68" cy="58" r="2.5" fill="#FFFFFF"/>
    <!-- Check badge (top right) -->
    <circle cx="70" cy="40" r="6" fill="#FFFFFF"/>
    <path d="M67,40L69,42.5L73,37.5"
          fill="none" stroke="#3B82F6" stroke-width="2.4"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
